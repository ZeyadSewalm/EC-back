services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: omera
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omera"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio-storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin123; do sleep 2; done;
      mc mb local/media-bucket --ignore-existing;
      exit 0;
      "

  django:
    build: .
    container_name: django-app
    restart: always
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: gunicorn --bind 0.0.0.0:8000 backend.wsgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_NAME: omera
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-docker-key}
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,django
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,http://localhost:4200
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_STORAGE_BUCKET_NAME: media-bucket
      AWS_S3_ENDPOINT_URL: http://minio:9000

volumes:
  postgres_data:
  minio_data:
